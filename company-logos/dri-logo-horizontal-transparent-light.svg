<svg width="940" height="320" viewBox="0 0 940 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Dynamic Robotics &amp; Integration logo (horizontal lockup)</title>
  <desc>The gear-ring robotics emblem on the left, with the DR&amp;I monogram and full company name stacked to the right.</desc>

  <defs>
    <linearGradient id="h_green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39b24c"/><stop offset="100%" stop-color="#247d2e"/>
    </linearGradient>
    <linearGradient id="h_gray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e2e2"/><stop offset="100%" stop-color="#aeaeae"/>
    </linearGradient>
    <linearGradient id="h_ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d8d8"/><stop offset="100%" stop-color="#9a9a9a"/>
    </linearGradient>
    <clipPath id="h_window"><circle cx="160" cy="160" r="124"/></clipPath>
  </defs>


  <!-- ============ EMBLEM (centered at 160,160) ============ -->
  <g transform="translate(160,160)">
    <g fill="url(#h_ring)">
      <g><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(15)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(30)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(45)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(60)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(75)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(90)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(105)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(120)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(135)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(150)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(165)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(180)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(195)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(210)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(225)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(240)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(255)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(270)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(285)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(300)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(315)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(330)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
      <g transform="rotate(345)"><rect x="-9" y="-162" width="18" height="24" rx="2"/></g>
    </g>
    <circle cx="0" cy="0" r="150" fill="url(#h_ring)"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#2E973E" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="124" fill="#ffffff"/>
  </g>

  <g clip-path="url(#h_window)">
    <!-- CNC MILL BACKDROP (shifted into emblem frame: emblem center 160) -->
    <g transform="translate(22,72) scale(0.66)" opacity="0.9">
      <rect x="-10" y="120" width="170" height="24" rx="4" fill="#7d8389"/>
      <rect x="6" y="106" width="138" height="16" rx="3" fill="#9da3a9"/>
      <rect x="0" y="6" width="22" height="104" rx="3" fill="#b6b6b6"/>
      <rect x="130" y="6" width="22" height="104" rx="3" fill="#b6b6b6"/>
      <rect x="-6" y="2" width="164" height="22" rx="4" fill="#8a9096"/>
      <rect x="-6" y="2" width="164" height="6" rx="3" fill="#aeaeae"/>
      <rect x="56" y="6" width="38" height="22" rx="3" fill="#2a8c33"/>
      <circle cx="75" cy="17" r="3" fill="#1d6325"/>
      <rect x="64" y="26" width="20" height="44" rx="3" fill="#5c646c"/>
      <rect x="67" y="30" width="14" height="28" rx="2" fill="#3f464d"/>
      <rect x="70" y="70" width="8" height="14" rx="1" fill="#cdcdcd"/>
    </g>

    <!-- CONVEYOR BELT -->
    <g transform="translate(218,168)">
      <rect x="0" y="18" width="62" height="14" rx="7" fill="#5c646c"/>
      <circle cx="10" cy="25" r="11" fill="#8a9096" stroke="#3f464d" stroke-width="2"/>
      <circle cx="10" cy="25" r="3" fill="#3f464d"/>
      <circle cx="52" cy="25" r="11" fill="#8a9096" stroke="#3f464d" stroke-width="2"/>
      <circle cx="52" cy="25" r="3" fill="#3f464d"/>
      <rect x="6" y="12" width="50" height="6" rx="2" fill="#6b7378"/>
      <g stroke="#3f464d" stroke-width="1.5">
        <line x1="22" y1="12" x2="22" y2="18"/>
        <line x1="34" y1="12" x2="34" y2="18"/>
        <line x1="46" y1="12" x2="46" y2="18"/>
      </g>
      <rect x="16" y="-2" width="16" height="14" rx="2" fill="#2E973E"/>
      <rect x="19" y="1" width="10" height="3" rx="1" fill="#1d6325"/>
      <rect x="38" y="0" width="13" height="12" rx="2" fill="#cdcdcd"/>
      <rect x="41" y="3" width="8" height="3" rx="1" fill="#9a9a9a"/>
      <rect x="14" y="32" width="5" height="54" rx="2" fill="#7d8389"/>
      <rect x="46" y="32" width="5" height="54" rx="2" fill="#7d8389"/>
    </g>

    <!-- ROBOTIC ARM (emblem center 160 -> base at 142) -->
    <g transform="translate(142,238) scale(-0.62,0.62)">
      <rect x="-34" y="34" width="68" height="16" rx="4" fill="#9da3a9"/>
      <rect x="-24" y="22" width="48" height="16" rx="4" fill="#cdcdcd"/>
      <rect x="-9" y="14" width="18" height="12" rx="2" fill="#8a9096"/>
      <circle cx="0" cy="14" r="16" fill="#6b7378" stroke="#cdcdcd" stroke-width="3"/>
      <circle cx="0" cy="14" r="6" fill="#2E973E"/>
      <g transform="rotate(-14 0 14)">
        <rect x="-14" y="-86" width="28" height="100" rx="12" fill="url(#h_green)"/>
        <rect x="-5" y="-58" width="10" height="46" rx="5" fill="#2a8c33" opacity="0.65"/>
        <circle cx="0" cy="-72" r="2.6" fill="#1d6325"/>
        <circle cx="0" cy="-2" r="2.6" fill="#1d6325"/>
        <g transform="translate(0,-86)">
          <circle cx="0" cy="0" r="14" fill="#6b7378" stroke="#cdcdcd" stroke-width="3"/>
          <circle cx="0" cy="0" r="5" fill="#2E973E"/>
          <g transform="rotate(-31)">
            <rect x="-13" y="-116" width="26" height="116" rx="12" fill="url(#h_gray)"/>
            <rect x="-4" y="-90" width="8" height="52" rx="4" fill="#9a9a9a" opacity="0.6"/>
            <circle cx="0" cy="-14" r="2.4" fill="#7d8389"/>
            <circle cx="0" cy="-100" r="2.4" fill="#7d8389"/>
            <circle cx="0" cy="-116" r="11" fill="#6b7378" stroke="#cdcdcd" stroke-width="2.5"/>
            <circle cx="0" cy="-116" r="4" fill="#2E973E"/>
            <g transform="translate(0,-116) rotate(180)">
              <rect x="-12" y="6" width="24" height="14" rx="3" fill="#8a9096"/>
              <rect x="-8" y="2" width="16" height="6" rx="2" fill="#5c646c"/>
              <path d="M-10 20 L-13 46 L-7 48 L-5 22 Z" fill="#cdcdcd" stroke="#9a9a9a" stroke-width="1"/>
              <rect x="-12" y="42" width="6" height="8" rx="1.5" fill="#2E973E"/>
              <path d="M10 20 L13 46 L7 48 L5 22 Z" fill="#cdcdcd" stroke="#9a9a9a" stroke-width="1"/>
              <rect x="6" y="42" width="6" height="8" rx="1.5" fill="#2E973E"/>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>
  <circle cx="160" cy="160" r="124" fill="none" stroke="#7d7d7d" stroke-width="2"/>
  <g fill="#ffffff" transform="translate(160,160)">
    <circle cx="0" cy="-137" r="4"/><circle cx="137" cy="0" r="4"/>
    <circle cx="0" cy="137" r="4"/><circle cx="-137" cy="0" r="4"/>
    <circle cx="97" cy="-97" r="4"/><circle cx="97" cy="97" r="4"/>
    <circle cx="-97" cy="97" r="4"/><circle cx="-97" cy="-97" r="4"/>
  </g>

  <!-- ============ WORDMARK (right) ============ -->
  <text x="372" y="150" font-family="'Arial Black', Arial, sans-serif" font-weight="800" font-size="84" letter-spacing="4" fill="#1b1f23">DR<tspan fill="#2E973E">&amp;</tspan>I</text>
  <text x="376" y="206" font-family="Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="2" fill="#1b1f23">DYNAMIC <tspan fill="#2E973E"> ROBOTICS</tspan></text>
  <text x="376" y="242" font-family="Arial, sans-serif" font-weight="600" font-size="21" letter-spacing="5" fill="#5f6b73">&amp; INTEGRATION</text>
</svg>
